map "$request_method:$cookie_memos_key" $write_allowed {
    default 0;
    "~^(POST|PATCH|DELETE):YOUR_COOKIE_KEY$" 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    client_max_body_size 50m;

    set $cache_off 0;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — cookie 认证写操作
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET,POST,PATCH,DELETE,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type";
            return 204;
        }
        set $deny 0;
        if ($request_method !~ ^(GET|OPTIONS)$) { set $deny 1; }
        if ($write_allowed = 1) { set $deny 0; }
        if ($deny = 1) { return 403; }
        proxy_pass http://memos:5230;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer YOUR_MEMOS_TOKEN";
        client_max_body_size 50m;
    }

    location /mcp {
        proxy_pass http://memos:5230;
        proxy_set_header Host $host;
    }

    # 图片代理 — 浏览器缓存 7 天（^~ 优先于 regex）
    location ^~ /file/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        proxy_pass http://memos:5230;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer YOUR_MEMOS_TOKEN";
    }

    # 每日随机 banner 配置 — 短缓存 5 分钟（每天凌晨 NAS cron 更新）
    location = /banner/daily.json {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # 静态资源浏览器缓存 30 天
    location ~* \.(webp|avif|jpg|jpeg|png|gif|svg|ico|woff2|ttf|css|js|map)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
